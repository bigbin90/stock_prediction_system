services:
  stock-prediction:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stock-prediction
    ports:
      - "8765:8765"
    environment:
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=8765
      - TZ=Asia/Shanghai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/api/stock/analyze', data=b'{}') || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s